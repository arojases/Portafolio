<section id="contact" data-section class="footer">
  <div class="footer__copy">
    <p class="eyebrow">{{ i18n.t('footer.eyebrow') }}</p>
    <h2>{{ i18n.t('footer.title') }}</h2>
    <p>{{ i18n.t('footer.message') }}</p>
  </div>

  <div class="footer__actions">
    <a
      class="icon-link"
      href="mailto:arielalejandrorojas@gmail.com"
      [attr.aria-label]="i18n.t('footer.emailAria')"
      [attr.title]="i18n.t('footer.emailAria')"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M4 6h16v12H4z" />
        <path d="m4 7 8 6 8-6" />
      </svg>
    </a>
    <a href="https://www.linkedin.com/in/arielrojasescudero" target="_blank" rel="noreferrer">
      LinkedIn
    </a>
    <a
      class="icon-link"
      href="tel:+56987367565"
      [attr.aria-label]="i18n.t('footer.phoneAria')"
      [attr.title]="i18n.t('footer.phoneAria')"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.35 1.9.66 2.81a2 2 0 0 1-.45 2.11L8.05 9.91a16 16 0 0 0 6.04 6.04l1.27-1.27a2 2 0 0 1 2.11-.45c.91.31 1.85.53 2.81.66A2 2 0 0 1 22 16.92z" />
      </svg>
    </a>
    <a href="https://github.com/arojases" target="_blank" rel="noreferrer">GitHub</a>
    @if (user.blog) {
      <a [href]="user.blog" target="_blank" rel="noreferrer">{{ i18n.t('footer.site') }}</a>
    }
  </div>
</section>
