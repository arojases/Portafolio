<header class="navbar">
  <div class="brand">
    <a routerLink="/" [attr.aria-label]="i18n.t('nav.homeAria')">{{ config.githubUsername }}</a>
  </div>

  <button
    class="menu-toggle"
    type="button"
    (click)="toggleMenu()"
    [attr.aria-expanded]="menuOpen()"
    [attr.aria-label]="i18n.t('nav.menuAria')"
  >
    <span></span>
    <span></span>
  </button>

  <nav class="nav-links" [class.open]="menuOpen()">
    @for (item of items(); track item.id) {
      <button
        type="button"
        class="nav-link"
        [class.active]="activeSection() === item.id"
        (click)="scrollTo(item.id)"
      >
        {{ item.label }}
      </button>
    }

    <a class="github-link" [href]="config.ctaSecondary.url" target="_blank" rel="noreferrer">
      GitHub
    </a>
    <button
      type="button"
      class="language-toggle"
      [attr.aria-label]="i18n.t('nav.languageAria')"
      (click)="toggleLanguage()"
    >
      {{ i18n.language() === 'es' ? 'EN' : 'ES' }}
    </button>
  </nav>
</header>
