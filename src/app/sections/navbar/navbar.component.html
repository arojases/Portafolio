<header class="navbar">
  <div class="brand">
    <a routerLink="/" aria-label="Ir al inicio">{{ config.githubUsername }}</a>
  </div>

  <button
    class="menu-toggle"
    type="button"
    (click)="toggleMenu()"
    [attr.aria-expanded]="menuOpen()"
    aria-label="Abrir menu"
  >
    <span></span>
    <span></span>
  </button>

  <nav class="nav-links" [class.open]="menuOpen()">
    @for (item of items; track item.id) {
      <button
        type="button"
        class="nav-link"
        [class.active]="activeSection() === item.id"
        (click)="scrollTo(item.id)"
      >
        {{ item.label }}
      </button>
    }

    <a class="github-link" [href]="config.ctaSecondary.url" target="_blank" rel="noreferrer">
      GitHub
    </a>
  </nav>
</header>
